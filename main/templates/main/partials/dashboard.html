<section class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    {% if error %}
        <div class="mb-6 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
            {{ error }}
        </div>
    {% endif %}

    {% if stations_error %}
        <div class="mb-6 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
            {{ stations_error }}
        </div>
    {% elif stations_data %}
        <div class="grid gap-6 sm:grid-cols-1 lg:grid-cols-2 xl:grid-cols-3">
            {% for station in stations_data %}
                {% include "main/partials/station_card.html" with station=station %}
            {% endfor %}
        </div>
    {% else %}
        <div class="rounded-2xl border border-dashed border-slate-300 bg-white p-10 text-center text-slate-500">
            No station data available.
        </div>
    {% endif %}
</section>
