<div class="rounded-2xl mx-auto border max-w-md border-slate-200 bg-white p-5 shadow-sm mt-6">
    <div class="flex items-start justify-between gap-4">
        <div>
            <p class="text-xs font-semibold uppercase tracking-[0.18em] text-sky-600">
                New Station
            </p>
            <h3 class="mt-2 mb-2 text-lg font-semibold text-slate-900">
                Add a station
            </h3>
        </div>
        <span class="rounded-full px-3 py-1 text-xs font-medium bg-slate-100 text-slate-500">
            Pending
        </span>
    </div>

    <form method="post" class="mt-4 flex flex-col gap-3">
        {% csrf_token %}
        <input type="hidden" name="action" value="add_station">

        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">
                Station Name
            </label>
            <input
                type="text"
                name="station_name"
                placeholder="e.g. Roof Station 01"
                class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
            >
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">
                Location
            </label>
            <input
                type="text"
                name="station_loc"
                placeholder="e.g. Savski Venac Roof"
                class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
            >
        </div>

        <button
    type="submit"
    class="mt-2 w-full rounded-xl bg-sky-600 px-5 py-3 text-sm font-semibold text-black transition hover:bg-sky-700 focus:outline-none focus:ring-4 focus:ring-sky-100 cursor-pointer">
    Add Station
        </button>
    </form>
</div>
