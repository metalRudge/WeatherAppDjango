<div class="mx-auto w-full max-w-2xl space-y-6 rounded-3xl bg-slate-50 p-6 shadow-sm sm:p-8">
    <div class="flex flex-col gap-3 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm sm:flex-row sm:items-center sm:justify-between sm:p-8">
        <div>
            <h3 class="text-xl font-semibold text-slate-900">
                Add a station
            </h3>
            <p class="mt-2 text-sm text-slate-500">
                Enter station details to keep your network up to date.
            </p>
        </div>
        <span class="inline-flex items-center justify-center rounded-full bg-sky-100 px-4 py-2 text-xs font-semibold uppercase tracking-[0.24em] text-sky-700">
            Pending
        </span>
    </div>

    <form method="post" class="space-y-6 p-4">
        {% csrf_token %}
        <input type="hidden" name="action" value="add_station">

        <div class="space-y-6 rounded-3xl bg-white p-4 shadow-sm border border-slate-200">
            <div class="m-4 pb-2">
                <label class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400 m-4">
                    Station ID
                </label>
                <input
                    type="text"
                    name="station_id"
                    placeholder="e.g. STN-001"
                    class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
                >
            </div>

            <div class="m-4 pb-2">
                <label class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400 m-4">
                    Station Name
                </label>
                <input
                    type="text"
                    name="station_name"
                    placeholder="e.g. Roof Station 01"
                    class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
                >
            </div>

            <div class="m-4 pb-2">
                <label class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400 m-4">
                    Location
                </label>
                <input
                    type="text"
                    name="station_loc"
                    placeholder="e.g. Savski Venac Roof"
                    class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
                >
            </div>
        </div>

        <button type="submit" class="mt-5 w-full rounded-2xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-sky-700 focus:outline-none focus:ring-4 focus:ring-sky-100">
            Add Station
        </button>
    </form>
</div>
